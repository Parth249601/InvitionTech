version: "3.9"

services:
  forexguard-api:
    build: .
    container_name: forexguard-api
    ports:
      - "8000:8000"
    volumes:
      # Mount model artifacts so they persist across rebuilds
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
